[global]
   workgroup = WORKGROUP
   server string = Branch File Server
   netbios name = FILE-GW
   security = user
   map to guest = Bad User
   guest account = nobody
   server min protocol = SMB2
   logging = file
   log file = /var/log/samba/log.smbd
   max log size = 0
   load printers = no
   printing = bsd
   disable spoolss = yes
   smb ports = 445

[public]
   path = /srv/public
   browseable = yes
   guest ok = yes
   read only = no
   create mask = 0644
   directory mask = 0755
   force user = nobody
